<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/amp-favicon.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>AMP Field Software</title>
    <style>
      /* AMP Logo Favicon */
      .favicon-container {
        display: inline-block;
        width: 32px;
        height: 32px;
        position: relative;
      }
      
      .favicon-outer-border {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #F05A28;
        border-radius: 7px;
      }
      
      .favicon-inner-border {
        position: absolute;
        top: 2px;
        left: 2px;
        width: calc(100% - 4px);
        height: calc(100% - 4px);
        background-color: white;
        border-radius: 5px;
        border: 1px solid #C5A15D;
      }
      
      .favicon-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 14px;
        color: #3A1D0C;
        -webkit-text-stroke: 0.5px #C5A15D;
        letter-spacing: -1px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
