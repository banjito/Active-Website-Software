# electron-builder config for ampOS Offline.
# Phase 0 baseline; signing/notarization/auto-update feeds are wired in Phase 6.
appId: com.ampreports.offlinereports
productName: ampOS Offline
copyright: Copyright © Amp Reports

directories:
  output: release
  buildResources: build-resources

# What ships inside the asar. The compiled Electron processes plus the built
# renderer (emitted by `npm run electron:build`). The renderer is fully bundled
# by Vite, so the ONLY runtime node_module needed is the native better-sqlite3
# (and its `bindings`/`file-uri-to-path` helpers). Everything else in this
# webapp's package.json (puppeteer, react-pdf, …) is excluded to keep the app
# small — otherwise electron-builder drags in the entire web dependency tree.
files:
  - electron/build/**/*
  - electron/renderer-dist/**/*
  - "!node_modules/**/*"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/file-uri-to-path/**/*"

extraResources:
  - from: build-resources/icon.png
    to: build-resources/icon.png
  - from: build-resources/icon-dark.png
    to: build-resources/icon-dark.png

# better-sqlite3 (added in Phase 1) is a native module and must stay unpacked.
asarUnpack:
  - "**/node_modules/better-sqlite3/**"

win:
  # Hand-built .ico (BMP frames for 16-128px, PNG for 256px). Without it,
  # electron-builder converts icon.png into an all-PNG-frame .ico, which some
  # Windows shell surfaces (taskbar, shortcuts) render as a blank icon.
  icon: build-resources/icon.ico
  target:
    - nsis
    - msi
  artifactName: ${productName}_${version}_${arch}.${ext}

mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  hardenedRuntime: true

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
