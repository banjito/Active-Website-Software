# Deploy as a SEPARATE Netlify site from the staff app.
# In Netlify site settings, set "Base directory" to: customer-portal
# (so this file, build, and publish paths resolve correctly), then point
# the custom domain customer.ampos.io at this site.
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
