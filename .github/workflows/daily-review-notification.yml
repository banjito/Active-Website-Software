name: Daily Review Notification

on:
  schedule:
    # Runs daily at 17:30 UTC (11:30 AM CST, 12:30 PM CDT)
    - cron: '30 17 * * *'
  workflow_dispatch: # Allows manual triggering for testing

jobs:
  send-notification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check Current Time
        run: |
          echo "Current UTC time: $(date -u)"
          echo "Current local time: $(date)"
          echo "Timezone: $(timedatectl show --property=Timezone --value 2>/dev/null || echo 'UTC')"

      - name: Send Daily Review Notification
        run: |
          echo "Sending daily review notification..."
          echo "Target time was: 17:30 UTC (11:30 AM CST)"

          # Write body to a file and capture status separately so a body that
          # ends in digits can't corrupt the parsed status code.
          http_code=$(curl -s -o response_body.json -w "%{http_code}" \
            --retry 3 --retry-delay 5 --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPABASE_URL }}/functions/v1/daily-review-notification")

          echo "HTTP Status Code: $http_code"
          echo "Response:"
          cat response_body.json || true
          echo ""

          if [ "$http_code" -eq 200 ]; then
            echo "✅ Daily review notification sent successfully"
          elif [ "$http_code" -eq 401 ] || [ "$http_code" -eq 403 ]; then
            echo "❌ Authentication failed ($http_code) — check SUPABASE_SERVICE_ROLE_KEY / SUPABASE_URL secrets"
            exit 1
          else
            echo "❌ Failed to send daily review notification (HTTP $http_code)"
            exit 1
          fi

      - name: Log Notification Attempt
        if: always()
        run: |
          echo "Daily review notification job completed at $(date)"
          echo "Timezone: $(timedatectl show --property=Timezone --value 2>/dev/null || echo 'UTC')"
